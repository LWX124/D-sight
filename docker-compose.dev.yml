services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dsight
      POSTGRES_PASSWORD: dsight
      POSTGRES_DB: dsight
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6381}:6379"

volumes:
  pgdata:
